<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Contacts </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>Contacts</h2>
    <button class="btn btn-primary mb-3" id="addContactBtn">Add new Contact</button>
    <table class="table table-bordered table-hover" id="contactsTable">
        <thead class="table-dark">
            <tr><th>ID</th><th>Name</th><th>MobilePhone</th><th>JobTitle</th><th>BirthDate</th><th>Actions</th></tr>
        </thead>
        <tbody id="contactsBody"></tbody>
    </table>
    <div class="modal fade" id="contactModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Contact</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="contactForm">
                        <input type="hidden" id="contactId">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" required>
                            <div class="invalid-feedback">Name required</div>
                        </div>
                        <div class="mb-3">
                            <label for="mobilePhone" class="form-label">Mobile phone number</label>
                            <input type="tel" class="form-control" id="mobilePhone">
                            <div class="invalid-feedback">Some phone number</div>
                        </div>
                        <div class="mb-3">
                            <label for="jobTitle" class="form-label">JobTitle</label>
                            <input type="text" class="form-control" id="jobTitle">
                        </div>
                        <div class="mb-3">
                            <label for="birthDate" class="form-label">BirthDate</label>
                            <input type="date" class="form-control" id="birthDate">
                            <div class="invalid-feedback">Date can'not be in the future or earlier than 1900</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/site.js"></script>

</body>
</html>
